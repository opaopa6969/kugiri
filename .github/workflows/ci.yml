name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

# japanese-parser-common(jpc) は GitHub Packages にまだ常時 publish していないため、
# CI では caulis/japanese-parser-common を checkout して mvn install してから kugiri を
# ビルドする。jpc の解決する unlaxer-common は unlaxer-bom registry(private)から取得する。
#
# 必要な secret:
#   PACKAGES_READ_TOKEN … read:packages 権限の PAT。さらに caulis/japanese-parser-common を
#     checkout するため repo(contents:read) 権限も必要。
#   無い場合は GITHUB_TOKEN にフォールバックするが、別オーナーの package/private repo は
#   読めないため失敗しうる。

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout kugiri
        uses: actions/checkout@v4

      - name: Checkout japanese-parser-common (dependency source)
        uses: actions/checkout@v4
        with:
          repository: caulis/japanese-parser-common
          path: _jpc
          token: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Configure Maven settings (GitHub Packages read)
        env:
          GH_PKG_TOKEN: ${{ secrets.PACKAGES_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml <<EOF
          <settings><servers>
            <server><id>github-unlaxer-bom</id><username>${{ github.repository_owner }}</username><password>${GH_PKG_TOKEN}</password></server>
          </servers></settings>
          EOF

      - name: Build & install japanese-parser-common (to local .m2)
        run: mvn -B -ntp -f _jpc/pom.xml -DskipTests install

      - name: Compile & test kugiri
        run: mvn -B -ntp test -DfailIfNoTests=false

      - name: Smoke-run demos
        run: |
          mvn -B -ntp -q exec:java -Dexec.mainClass=org.unlaxer.kugiri.demo.SynthDemo -Dstdout.encoding=UTF-8
          mvn -B -ntp -q exec:java -Dexec.mainClass=org.unlaxer.kugiri.demo.AbrDemo -Dstdout.encoding=UTF-8
          mvn -B -ntp -q exec:java -Dexec.mainClass=org.unlaxer.kugiri.demo.AzaDemo -Dstdout.encoding=UTF-8

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: ignore
