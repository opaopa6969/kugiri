<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>kugiri-building 検索</title>
<style>
  body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; color: #222; }
  h1 { font-size: 1.3rem; } h2 { font-size: 1rem; margin-top: 1.5rem; color: #555; }
  input { font-size: 1rem; padding: .4rem .6rem; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
  pre { background: #f6f8fa; padding: .8rem; border-radius: 6px; overflow-x: auto; font-size: .85rem; }
  .row { display: flex; gap: .5rem; align-items: center; }
  .muted { color: #888; font-size: .85rem; }
</style>
</head>
<body>
  <h1>kugiri-building</h1>
  <p class="muted">住所末尾の建物テールを分解し、建物名で検索できます（サンプルデータ）。</p>

  <h2>建物テール分解</h2>
  <input id="tail" placeholder="例: 府営柱本団地B2-407" value="府営柱本団地B2-407">
  <pre id="parseOut">—</pre>

  <h2>建物名 検索</h2>
  <input id="q" placeholder="例: 梅田 / 荘" value="梅田">
  <pre id="searchOut">—</pre>

  <h2>要レビュー</h2>
  <pre id="reviewOut">—</pre>

<script>
const j = async (u) => (await fetch(u)).json();
const show = (id, v) => document.getElementById(id).textContent = JSON.stringify(v, null, 2);
const debounce = (f, ms=250) => { let t; return (...a)=>{clearTimeout(t); t=setTimeout(()=>f(...a), ms);}; };

const doParse = debounce(async () => show('parseOut', await j('/api/parse?tail=' + encodeURIComponent(tail.value))));
const doSearch = debounce(async () => show('searchOut', await j('/api/search?q=' + encodeURIComponent(q.value))));

tail.addEventListener('input', doParse);
q.addEventListener('input', doSearch);
doParse(); doSearch();
j('/api/reviews').then(v => show('reviewOut', v.length ? v : '（なし）'));
</script>
</body>
</html>
